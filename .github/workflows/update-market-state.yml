name: Update market state

# 日次で日経平均データを取得し、急落モード(state.json)とイベント週次データ
# (History/events/*.json)を再生成してコミットする。
# main への push により Vercel が自動で再デプロイする。

on:
  schedule:
    # 平日 09:00 UTC = 18:00 JST(東京市場クローズ後)
    - cron: "0 9 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-market-state
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 急落モード状態を更新 (state.json)
        run: node backtest/scripts/update_state.mjs

      - name: イベント週次データを更新 (History/events/*.json)
        run: node backtest/scripts/build_event_data.mjs

      - name: イベント個別ページ・sitemap を再生成
        run: node backtest/scripts/build_event_pages.mjs

      - name: 変更があればコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json History/events/*.json events/*.html sitemap.xml
          if git diff --cached --quiet; then
            echo "変更なし。スキップします。"
          else
            git commit -m "chore: 市場データを自動更新 [skip ci]"
            git push
          fi
