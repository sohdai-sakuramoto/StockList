<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex" />
  <title>リダイレクト中… — 日経平均と大きな出来事</title>
  <!-- 個別イベントは静的ページ(events/<id>.html)へ移行。旧URL(?e=<id>)を維持のためリダイレクト。 -->
  <script>
    (function () {
      var e = new URLSearchParams(location.search).get("e");
      var id = (e && /^[a-z0-9-]+$/.test(e)) ? e : "lehman";
      location.replace("events/" + id + ".html");
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=events/lehman.html" />
</head>
<body>
  <p>移動中です… <a href="events/lehman.html">こちらをクリック</a>してください。</p>
</body>
</html>
