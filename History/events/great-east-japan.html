    <div class="slv-head">
      <h1>東日本大震災</h1>
      <span class="cat">災害</span>
      <span class="date">2011-03-11 前後</span>
    </div>
    <p class="slv-summary">マグニチュード9.0の地震と津波、福島第一原発事故が重なりリスクオフが進行。震災後2営業日で大きく下落した後、協調介入などで戻した。</p>

    <div id="slv-root"></div>

    <noscript>
      <h2>当時の主なニュース</h2>
      <ul><li><strong>2011-03-11｜東北地方太平洋沖地震が発生（14:46）</strong><br>引け間際に発生し、売り注文が殺到して急落。（日本経済新聞）</li><li><strong>2011-03-14｜震災後初の取引、633円安（-6.2%）</strong><br>寄り付きから売り殺到。原発事故の影響で東京電力はストップ安、大引けまで取引成立せず。（日本経済新聞）</li><li><strong>2011-03-15｜-10.55%、過去3番目の下落率</strong><br>原発事故への懸念が拡大し、東証一部は歴史的な下落率を記録した。（日本経済新聞）</li><li><strong>2011-03-16｜買い戻しで大幅反発、9,000円台回復（+488円）</strong><br>震災後続いた下げが止まり、自律反発の買いが入った。（日本経済新聞）</li><li><strong>2011-03-18｜G7の協調介入合意で円高懸念後退、246円高</strong><br>為替の協調介入が合意され、輸出関連を中心に買い戻された。（日本経済新聞）</li></ul>
    </noscript>

    <aside class="slv-cta">
      <p class="slv-cta-lead">暴落は、歴史的にはいつか戻ってきました。</p>
      <p class="slv-cta-sub">狼狽売りより、次の下落に備えて少額から。長期・積立の第一歩は口座づくりから。</p>
