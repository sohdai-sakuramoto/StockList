    <p class="slv-summary">新型コロナウイルスの世界的拡大とロックダウン懸念でグローバル同時株安。急落と急反発が交互に出やすい局面となった。</p>

    <div id="slv-root"></div>

    <noscript>
      <h2>当時の主なニュース</h2>
      <ul><li><strong>2020-02-25｜感染の世界拡大懸念で急落開始</strong><br>欧米での感染拡大が伝わり、リスク回避の売りが強まった。（各種報道）</li><li><strong>2020-03-09｜原油急落も重なり-5.07%</strong><br>産油国の協調減産決裂による原油急落が加わり、下げが加速。（各種報道）</li><li><strong>2020-03-13｜-6.08%、コロナショック本格化</strong><br>WHOのパンデミック宣言を受け、世界的に株安が進行した。（各種報道）</li><li><strong>2020-03-19｜一時16,358円まで下落（底値圏）</strong><br>この週を底に、各国の大規模な金融・財政策への期待で反発に転じた。（各種報道）</li><li><strong>2020-04-01｜感染拡大で警戒感、851円安（-4.50%）</strong><br>経済活動停滞の警戒感から米株先物が大幅安、下げ幅は一時1000円超。（日本経済新聞）</li><li><strong>2020-04-07｜緊急事態宣言、756円高</strong><br>感染ピークアウト期待や短期筋の買いで急反発。7都府県に緊急事態宣言。（日本経済新聞）</li></ul>
    </noscript>
