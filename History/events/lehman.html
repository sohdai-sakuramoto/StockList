      <h1>リーマンショック</h1>
      <span class="cat">金融危機</span>
      <span class="date">2008-09-15 前後</span>
    </div>
    <p class="slv-summary">米大手投資銀行リーマン・ブラザーズの経営破綻を引き金に世界的な信用収縮が発生。日経平均は約2か月でバブル後最安値まで急落した。</p>

    <div id="slv-root"></div>

    <noscript>
      <h2>当時の主なニュース</h2>
      <ul><li><strong>2008-09-15｜リーマン・ブラザーズが経営破綻</strong><br>米連邦倒産法第11章の適用を申請。世界的な金融不安が一気に高まった。日本は敬老の日で休場。（各種報道）</li><li><strong>2008-09-16｜日経平均、前週末比605円安（-4.95%）</strong><br>NY株の急落を受け3年2か月ぶりの安値。金融株を中心に全面安となった。（日本経済新聞）</li><li><strong>2008-10-08｜世界同時株安で-9.38%</strong><br>各国の協調利下げも売りを止められず、終値は9,203円台まで下落。（各種報道）</li><li><strong>2008-10-16｜-11.41%、歴史的な下落率</strong><br>世界景気後退への懸念が強まり、終値は8,458円台。（各種報道）</li><li><strong>2008-10-28｜バブル後最安値 7,162円台</strong><br>売りが一巡し、この日を底に急反発に転じた。（各種報道）</li></ul>
    </noscript>

    <aside class="slv-cta">
      <p class="slv-cta-lead">暴落は、歴史的にはいつか戻ってきました。</p>
